buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 24
        // 本机已装 android-34/36（无 35），用 36 作为编译 SDK（向后兼容 RN 0.77 所需的 35）
        compileSdkVersion = 36
        targetSdkVersion = 34
        // RN 0.82 的 C++ 用了 std::format，需 NDK 27+ 的 libc++；本机已装 29，用它（官方要 27.1）
        ndkVersion = "29.0.14033849"
        kotlinVersion = "2.0.21"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

// react-native-code-push 8.3.1 的 android/app/build.gradle 用旧式 AndroidManifest package，
// 没声明 namespace；AGP 8 强制要 namespace，否则 "Namespace not specified"。
// 用 plugins.withId 在插件应用时注入（不能用 afterEvaluate——该子项目可能已被 RN 插件提前求值）。
subprojects { subproject ->
    if (subproject.name == "react-native-code-push") {
        subproject.plugins.withId("com.android.library") {
            subproject.android {
                if (namespace == null) {
                    namespace "com.microsoft.codepush.react"
                }
            }
        }
    }
}
