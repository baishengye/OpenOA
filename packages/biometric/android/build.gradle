// 库模块只声明 kotlin 插件 classpath（版本复用根工程），AGP 由宿主根工程提供，避免 classpath 版本冲突。
buildscript {
  def kotlinVersion = rootProject.ext.has("kotlinVersion") ? rootProject.ext.get("kotlinVersion") : "2.0.21"
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion"
  }
}

apply plugin: "com.android.library"
apply plugin: "org.jetbrains.kotlin.android"

// 引入 RN 提供的库 facebook 工具方法，自动接管 New Architecture / codegen 接入
apply plugin: "com.facebook.react"

def getExtOrDefault(name, defaultValue) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : defaultValue
}

android {
  namespace "com.itc.biometric"
  compileSdk getExtOrDefault("compileSdkVersion", 34) as int

  defaultConfig {
    minSdk getExtOrDefault("minSdkVersion", 24) as int
  }

  buildFeatures {
    buildConfig true
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = "17"
  }
}

repositories {
  google()
  mavenCentral()
}

dependencies {
  implementation "com.facebook.react:react-android"
  implementation "androidx.biometric:biometric:1.1.0"
  implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1"
}
