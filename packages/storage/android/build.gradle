buildscript {
  def kotlinVersion = rootProject.ext.has("kotlinVersion") ? rootProject.ext.get("kotlinVersion") : "2.1.0"
  repositories { google(); mavenCentral() }
  dependencies {
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion"
  }
}

apply plugin: "com.android.library"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

def getExtOrDefault(name, defaultValue) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : defaultValue
}

android {
  namespace "com.itc.storage"
  compileSdk getExtOrDefault("compileSdkVersion", 34) as int
  defaultConfig { minSdk getExtOrDefault("minSdkVersion", 24) as int }
  buildFeatures { buildConfig true }
  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }
  kotlinOptions { jvmTarget = "17" }
}

repositories { google(); mavenCentral() }

dependencies {
  implementation "com.facebook.react:react-android"
  implementation "com.tencent:mmkv:1.3.9"
}
